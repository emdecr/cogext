# =============================================================================
# PRODUCTION DOCKER COMPOSE
# =============================================================================
#
# Services:
#   app      — Next.js app (pulled from GHCR, standalone mode)
#   db       — PostgreSQL 17 + pgvector for relational data + vector search
#   minio    — S3-compatible object storage for uploaded images/files
#
# AI services (embeddings, tagging, chat) use cloud APIs:
#   - Voyage AI for embeddings
#   - Anthropic Claude for tagging + chat
# No local AI container needed.
#
# Networking:
#   All services share the internal "cogext_net" bridge network.
#   Services talk to each other using their service name as hostname:
#     app → db:5432, app → minio:9000
#   NO ports are published to the host for db or minio internal API.
#   Only the app (3000) and MinIO console (localhost:9001) are accessible.
#   Nginx (running on the host) proxies :443 → app:3000.
#
# Persistence:
#   Named volumes survive `docker compose down` but are wiped by `docker compose
#   down -v`. Never use -v in production.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f app
#   docker compose -f docker-compose.prod.yml down        # stops, keeps data
#   docker compose -f docker-compose.prod.yml pull        # pull latest images
# =============================================================================

services:

  # ===========================================================================
  # APP — Next.js (standalone)
  # ===========================================================================
  app:
    # Pre-built image from GitHub Container Registry.
    # Pushed by CI on every merge to main.
    image: ghcr.io/emdecr/cogext:latest

    restart: unless-stopped

    # Publish port 3000 on the host so Nginx can proxy to it.
    ports:
      - "3000:3000"

    # Runtime environment variables from .env (gitignored).
    env_file:
      - .env

    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0

    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

    networks:
      - cogext_net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Memory limit — keeps the app from eating all RAM on a 2GB instance.
    deploy:
      resources:
        limits:
          memory: 256m


  # ===========================================================================
  # DB — PostgreSQL 17 + pgvector
  # ===========================================================================
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped

    # Tuned for a 2GB instance. Override default Postgres settings that
    # assume more RAM than we have.
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c effective_cache_size=256MB
      -c maintenance_work_mem=32MB

    # Postgres reads POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB from env_file.
    env_file:
      - .env

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogext -d cogext"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - cogext_net

    deploy:
      resources:
        limits:
          memory: 512m


  # ===========================================================================
  # MINIO — S3-compatible object storage
  # ===========================================================================
  # MinIO replaces the local public/uploads/ directory.
  #
  # First-time setup: create the bucket via the web console.
  #   SSH tunnel: ssh -L 9001:localhost:9001 deploy@your-server
  #   Then open http://localhost:9001 in your browser.
  minio:
    image: minio/minio:latest
    restart: unless-stopped

    command: server /data --console-address ":9001"

    # MinIO reads MINIO_ROOT_USER, MINIO_ROOT_PASSWORD from env_file.
    env_file:
      - .env

    ports:
      # Console on localhost only — not publicly accessible.
      # Access via SSH tunnel when needed.
      - "127.0.0.1:9001:9001"
      # S3 API on localhost for Nginx to proxy image requests.
      - "127.0.0.1:9000:9000"

    volumes:
      - minio_data:/data

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - cogext_net

    deploy:
      resources:
        limits:
          memory: 256m


# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  pgdata:       # PostgreSQL data files
  minio_data:   # Uploaded images and files


# =============================================================================
# NETWORKS
# =============================================================================
networks:
  cogext_net:
    driver: bridge
