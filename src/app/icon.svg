<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- Connections (edges between nodes) -->
  <line x1="16" y1="7" x2="8" y2="15" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="16" y1="7" x2="24" y2="13" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="8" y1="15" x2="12" y2="24" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="24" y1="13" x2="20" y2="23" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="8" y1="15" x2="20" y2="23" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="24" y1="13" x2="12" y2="24" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="12" y1="24" x2="20" y2="23" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Nodes -->
