# =============================================================================
# NGINX — brain-extension reverse proxy
# =============================================================================
# Install: copy to /etc/nginx/sites-available/, symlink to sites-enabled/
#   sudo cp brain-extension.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/brain-extension.conf /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run Certbot to add SSL:
#   sudo certbot --nginx -d records.beforeiforgetthis.space
# =============================================================================

server {
    listen 80;
    server_name records.beforeiforgetthis.space;

    # Max upload size (for image uploads to MinIO via the app)
    client_max_body_size 10m;

    # -- App (Next.js) --
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Standard reverse proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev, but good practice)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # -- MinIO storage (serve uploaded images through Nginx with SSL) --
    # Images are stored in MinIO at /brain-uploads/<filename>
    # This proxy lets the app reference images as:
    #   https://records.beforeiforgetthis.space/storage/<filename>
    location /storage/ {
        proxy_pass http://127.0.0.1:9000/brain-uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache static images aggressively — they're immutable (content-addressed)
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
