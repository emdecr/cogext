services:
  db:
    # The container image to use. pgvector/pgvector is Postgres with the
    # vector extension pre-installed (needed for semantic search later).
    # The :pg17 tag pins us to Postgres 17.
    # Prod: same image — pgvector works identically in production.
    image: pgvector/pgvector:pg17

    # Map a port on your machine (left) to the port inside the container (right).
    # Postgres always listens on 5432 internally. We expose it on 5435 locally
    # to avoid collisions with other Postgres containers on your machine.
    # Prod: you'd typically remove this entirely — the app container talks to
    # the db container over Docker's internal network, so no port needs to be
    # exposed to the host machine. Exposing Postgres to the internet is a
    # security risk.
    ports:
      - "5435:5432"

    # These env vars are read by the Postgres image on FIRST BOOT ONLY.
    # It creates the user, sets the password, and creates the database.
    # On subsequent starts, it uses the existing data in the volume.
    # Prod: use strong, unique values. Never commit prod secrets to the repo —
    # use a .env file (gitignored) or Docker secrets instead.
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain_extension

    # Persist database files outside the container. Without this, every
    # `docker compose down` would wipe your data.
    # Left side: a named volume called "pgdata" (declared at the bottom).
    # Right side: where Postgres stores data inside the container.
    # Prod: same concept. For extra safety, you'd also set up regular
    # pg_dump backups to external storage (S3, etc).
    volumes:
      - pgdata:/var/lib/postgresql/data

    # Polls the database to check if it's actually ready to accept connections.
    # pg_isready is a Postgres utility built for this purpose.
    # Other services that depend on the db can use `depends_on: db: condition:
    # service_healthy` to wait for this check to pass before starting.
    # Prod: same config works fine. You might increase retries for slower
    # hardware or add restart: unless-stopped so Docker auto-restarts it
    # if it crashes.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain_extension"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ======================================================================
  # OLLAMA — Local AI inference server
  # ======================================================================
  # Ollama runs LLMs and embedding models locally. We use it for:
  #   1. nomic-embed-text — generates embeddings for semantic search
  #   2. llama3.2:1b — small LLM for auto-tagging records
  #
  # First start will be slow — it downloads the Ollama image (~1GB).
  # Models are downloaded on first use (when the app calls them).
  #
  # The container exposes port 11434. Your Next.js app (running on your
  # machine, not in Docker) calls http://localhost:11434/api/...
  #
  # Prod: same setup if your VPS has enough RAM. Otherwise, swap to
  # API-based providers (OpenAI, Voyage, Claude) via the provider
  # abstraction — no app code changes needed.
  ollama:
    image: ollama/ollama:latest

    ports:
      - "11434:11434"

    # Persist downloaded models so they survive container restarts.
    # Without this, you'd re-download ~1.5GB of models every time.
    volumes:
      - ollama_data:/root/.ollama

    # Healthcheck: use `ollama list` which returns 0 if the server is up.
    # The Ollama image doesn't include curl or wget, but the ollama
    # CLI is always available.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

# Top-level declaration of named volumes.
volumes:
  pgdata:
  ollama_data:
